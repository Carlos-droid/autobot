version: "3.9"

services:
  swarm-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: swarm_inmune
    volumes:
      - .:/app
      - /app/.venv # Protect container's venv from Windows host's .venv
      - /app/logs  # Persistent logs
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - OLLAMA_HOST=http://host.docker.internal:11434
      - MODEL_NAME=qwen2.5:14b
      - TELEMETRY_EXPORT=true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: on-failure
    # Network host facilitates telemetry and local Ollama access without trouble
    network_mode: host
